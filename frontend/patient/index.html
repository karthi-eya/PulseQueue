<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Patient Portal login details">
    <title>Patient Portal | Login</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <div class="glass-card">
            <header>
                <h1>Welcome</h1>
                <p>Please enter your details to proceed</p>
                <div class="step-indicator">
                    <span class="step active">1</span>
                    <span class="step-line"></span>
                    <span class="step">2</span>
                    <span class="step-line"></span>
                    <span class="step">3</span>
                    <span class="step-line"></span>
                    <span class="step">4</span>
                </div>
            </header>

            <form id="loginForm">
                <div class="form-section">
                    <h2>Patient Details</h2>
                    <div class="input-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>
                    
                    <div class="row">
                        <div class="input-group half">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required>
                        </div>
                        <div class="input-group half">
                            <label for="age">Age</label>
                            <input type="number" id="age" placeholder="25" min="0" max="150" required>
                        </div>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="submit" class="submit-btn">
                        <span>Next: Symptoms</span>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
