<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Patient Portal Appointment Booking">
    <title>Patient Portal | Appointment</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <div class="glass-card">
            <header>
                <h1>Appointment</h1>
                <p>Book a date and time to see the doctor</p>
                <div class="step-indicator">
                    <span class="step completed">1</span>
                    <span class="step-line active"></span>
                    <span class="step completed">2</span>
                    <span class="step-line active"></span>
                    <span class="step active">3</span>
                    <span class="step-line"></span>
                    <span class="step">4</span>
                </div>
            </header>

            <form id="appointmentForm">
                <div class="form-section">
                    <h2>Select Date & Time</h2>
                    <p class="section-desc">Note: Doctors are on break from 02:00 PM to 03:00 PM</p>
                    
                    <div class="input-group mt-3">
                        <label for="appointment_date">Appointment Date</label>
                        <input type="date" id="appointment_date" required min="">
                    </div>

                    <div class="input-group mt-3">
                        <label for="appointment_time">Select Time Slot</label>
                        <select id="appointment_time" class="custom-select" required>
                            <option value="">Choose a time slot...</option>
                            <!-- Morning Session -->
                            <option value="10:00 AM - 11:30 AM">10:00 AM - 11:30 AM</option>
                            <option value="11:45 AM - 01:15 PM">11:45 AM - 01:15 PM</option>
                            
                            <option value="---" disabled>--- Lunch Break (02:00 PM to 03:00 PM) ---</option>
                            
                            <!-- Afternoon Session -->
                            <option value="03:00 PM - 04:00 PM">03:00 PM - 04:00 PM</option>
                            <option value="04:15 PM - 05:15 PM">04:15 PM - 05:15 PM</option>
                            <option value="05:30 PM - 06:30 PM">05:30 PM - 06:30 PM</option>
                            <option value="07:00 PM - 08:00 PM">07:00 PM - 08:00 PM</option>
                        </select>
                    </div>
                </div>

                <div class="btn-group">
                    <a href="symptoms.html" class="back-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>Back</span>
                    </a>
                    <button type="submit" class="submit-btn flex-2">
                        <span>Book Appointment</span>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
