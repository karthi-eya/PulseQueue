<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseQueue | Unified Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg-color: #f8fafc;
            --text-dark: #0f172a;
            --text-light: #64748b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .background-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: #93c5fd;
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 500px;
            height: 500px;
            background: #bfdbfe;
            bottom: -150px;
            right: -100px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            font-family: inherit;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .toggle-text {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .toggle-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        #errorMsg {
            color: #ef4444;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            min-height: 20px;
        }
    </style>
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="glass-card">
        <h1 id="formTitle">Welcome Back</h1>
        <p class="subtitle" id="formSubtitle">Login to your PulseQueue account</p>

        <div id="errorMsg"></div>

        <form id="authForm">
            <!-- Signup-only fields (hidden by default) -->
            <div class="input-group" id="nameGroup" style="display:none;">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" placeholder="Enter your full name">
            </div>

            <div class="input-group" id="ageGroup" style="display:none;">
                <label for="signupAge">Age</label>
                <input type="number" id="signupAge" placeholder="Enter your age" min="1" max="120">
            </div>

            <div class="input-group">
                <label for="username">Username / User ID</label>
                <input type="text" id="username" required placeholder="Enter username">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Login</button>
        </form>

        <div class="toggle-text" id="toggleText">
            Are you a new patient? <a onclick="toggleMode()">Sign Up</a>
        </div>
    </div>

    <script>
        let isSignup = false;

        function toggleMode() {
            isSignup = !isSignup;
            const title = document.getElementById('formTitle');
            const subtitle = document.getElementById('formSubtitle');
            const btn = document.getElementById('submitBtn');
            const toggle = document.getElementById('toggleText');
            const nameGroup = document.getElementById('nameGroup');
            const ageGroup = document.getElementById('ageGroup');

            if (isSignup) {
                title.textContent = 'Create Patient Account';
                subtitle.textContent = 'Sign up to book your appointments';
                btn.textContent = 'Sign Up';
                toggle.innerHTML = 'Already have an account? <a onclick="toggleMode()">Login</a>';
                if (nameGroup) nameGroup.style.display = 'block';
                if (ageGroup) ageGroup.style.display = 'block';
            } else {
                title.textContent = 'Welcome Back';
                subtitle.textContent = 'Login to your PulseQueue account';
                btn.textContent = 'Login';
                toggle.innerHTML = 'Are you a new patient? <a onclick="toggleMode()">Sign Up</a>';
                if (nameGroup) nameGroup.style.display = 'none';
                if (ageGroup) ageGroup.style.display = 'none';
            }
            document.getElementById('errorMsg').textContent = '';
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = 'Processing...';

            // ── SIGNUP ──────────────────────────────────────────────────────
            if (isSignup) {
                const name = (document.getElementById('signupName')?.value || user).trim();
                const age = parseInt(document.getElementById('signupAge')?.value || '25', 10);
                try {
                    const res = await fetch('http://127.0.0.1:8000/auth/signup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, age, password: pass })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        alert(`✅ Account created!\n\nYour User ID: ${data.user_id}\n\nSave this — you'll need it to log in.`);
                        toggleMode(); // switch back to login
                        document.getElementById('username').value = data.user_id;
                    } else {
                        errorMsg.textContent = data.detail || 'Signup failed.';
                    }
                } catch (err) {
                    errorMsg.textContent = 'Server error. Make sure the backend is running.';
                }
                return;
            }

            // ── LOGIN (all roles go through backend) ─────────────────────────
            try {
                const res = await fetch('http://127.0.0.1:8000/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: user, password: pass })
                });
                const data = await res.json();

                if (!res.ok) {
                    errorMsg.textContent = data.detail || 'Login failed.';
                    return;
                }

                // Store JWT and role info
                localStorage.setItem('token', data.token);
                localStorage.setItem('userRole', data.role);
                localStorage.setItem('userId', user);

                if (data.role === 'doctor') {
                    // Also keep session storage so doctor React app recognises the session
                    sessionStorage.setItem('doctorAuth', 'true');
                    sessionStorage.setItem('doctorSpecialty', data.specialty || 'General Physician');
                    localStorage.setItem('doctorSpecialty', data.specialty || 'General Physician');
                } else if (data.role === 'reception') {
                    sessionStorage.setItem('receptionistAuth', 'true');
                } else if (data.role === 'patient') {
                    // Clear stale booking data for fresh session
                    localStorage.removeItem('appointmentNumber');
                    localStorage.setItem('patientName', data.name || user);
                }

                window.location.href = data.redirect;

            } catch (err) {
                errorMsg.textContent = 'Cannot reach server. Make sure the backend is running on port 8000.';
            }
        });
    </script>
</body>

</html>
